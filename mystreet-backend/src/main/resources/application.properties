# Application Name
spring.application.name=mystreet-backend

# Active Profile (dev or prod)
# Use 'dev' for H2 in-memory database (quick testing)
# Use 'prod' for MySQL database (persistent storage)
spring.profiles.active=prod

# Server Port
server.port=8080

# JWT Secret Key (256-bit for HS256)
jwt.secret=mystreet-secret-key-for-jwt-token-generation-2024-super-secure-key-here
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.mystreet=DEBUG
logging.level.org.springframework.security=DEBUG
